<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXT洗車！</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: #f0f4f8;
    color: #1a202c;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #2b6cb0, #3182ce);
    color: white;
    padding: 1.2rem 1rem;
    text-align: center;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.05em; }
  header p { font-size: 0.85rem; opacity: 0.85; margin-top: 0.25rem; }
  .container { max-width: 480px; margin: 0 auto; padding: 1rem; }

  .card {
    background: white;
    border-radius: 16px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .card-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: #718096;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.75rem;
  }

  .search-row {
    display: flex;
    gap: 8px;
  }
  #city-input {
    flex: 1;
    padding: 0.7rem 1rem;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  #city-input:focus { border-color: #3182ce; }
  #search-btn {
    padding: 0.7rem 1.2rem;
    background: #3182ce;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  #search-btn:hover { background: #2b6cb0; }
  #search-btn:disabled { background: #a0aec0; cursor: not-allowed; }

  #gps-btn {
    width: 100%;
    margin-top: 8px;
    padding: 0.6rem;
    background: white;
    color: #3182ce;
    border: 1.5px solid #bee3f8;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.2s;
  }
  #gps-btn:hover { background: #ebf8ff; }

  .verdict-box {
    border-radius: 14px;
    padding: 1.2rem;
    text-align: center;
  }
  .verdict-box.great { background: #f0fff4; border: 2px solid #68d391; }
  .verdict-box.caution { background: #fffaf0; border: 2px solid #f6ad55; }
  .verdict-box.bad { background: #fff5f5; border: 2px solid #fc8181; }

  .verdict-icon { font-size: 2.8rem; line-height: 1; margin-bottom: 0.5rem; }
  .verdict-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.4rem; }
  .verdict-box.great .verdict-title { color: #276749; }
  .verdict-box.caution .verdict-title { color: #7b341e; }
  .verdict-box.bad .verdict-title { color: #9b2335; }
  .verdict-desc { font-size: 0.9rem; color: #4a5568; line-height: 1.6; }

  .next-wash {
    background: #ebf8ff;
    border-radius: 12px;
    padding: 1rem;
    margin-top: 0.75rem;
    text-align: center;
  }
  .next-wash-label { font-size: 0.8rem; color: #2b6cb0; font-weight: 600; }
  .next-wash-date { font-size: 1.35rem; font-weight: 700; color: #1a365d; margin-top: 0.2rem; }

  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .day-cell {
    text-align: center;
    padding: 8px 2px;
    border-radius: 10px;
    border: 1.5px solid #e2e8f0;
    background: #f7fafc;
  }
  .day-cell.rain { background: #ebf8ff; border-color: #90cdf4; }
  .day-cell.snow { background: #f0f4ff; border-color: #a3bffa; }
  .day-cell.today { border-color: #3182ce; border-width: 2px; }
  .day-name { font-size: 0.68rem; color: #718096; font-weight: 600; }
  .day-date { font-size: 0.72rem; color: #4a5568; margin: 2px 0; }
  .day-icon { font-size: 1.4rem; line-height: 1.3; }
  .day-rain { font-size: 0.65rem; color: #3182ce; font-weight: 600; margin-top: 2px; }

  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    color: #718096;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  .location-name {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #2d3748;
    margin-bottom: 0.5rem;
  }
  .updated-at { font-size: 0.78rem; color: #a0aec0; }

  #loading {
    text-align: center;
    padding: 2rem;
    color: #718096;
    display: none;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e2e8f0;
    border-top-color: #3182ce;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 0.75rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error-msg {
    background: #fff5f5;
    border: 1.5px solid #fc8181;
    border-radius: 10px;
    padding: 0.9rem;
    color: #9b2335;
    font-size: 0.9rem;
    display: none;
    margin-bottom: 1rem;
  }

  #results { display: none; }

  .tips { font-size: 0.82rem; color: #718096; line-height: 1.7; }
  .tips li { margin-left: 1.2rem; margin-bottom: 0.2rem; }
</style>
</head>
<body>

<header>
  <h1>🚗 NEXT洗車！</h1>
  <p>天気予報から洗車タイミングをお知らせ</p>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">場所を入力</div>
    <div class="search-row">
      <input type="text" id="city-input" placeholder="例：岡山、大阪、渋谷" />
      <button id="search-btn" onclick="searchByCity()">検索</button>
    </div>
    <button id="gps-btn" onclick="useGPS()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M1 12h3M20 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 3"/></svg>
      現在地を使う
    </button>
  </div>

  <div id="error-msg"></div>

  <div id="loading">
    <div class="spinner"></div>
    <p>天気データを取得中...</p>
  </div>

  <div id="results">
    <div class="card">
      <div class="location-name">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        <span id="display-location">—</span>
      </div>
      <div id="verdict-area"></div>
    </div>

    <div class="card">
      <div class="card-title">7日間の天気</div>
      <div class="forecast-grid" id="forecast-grid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#90cdf4"></div>雨の日</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a3bffa"></div>雪の日</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e2e8f0"></div>晴れ/曇り</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">洗車のヒント</div>
      <ul class="tips">
        <li>洗車後は雨の日まで<strong>最低2日</strong>あるのが理想</li>
        <li>花粉・黄砂シーズンは汚れが落ちやすい朝に洗車</li>
        <li>直射日光の強い日中はウォータースポットに注意</li>
        <li>洗車後にコーティングすると次の汚れが落ちやすくなります</li>
      </ul>
    </div>
  </div>

</div>

<script>
const WMO_ICON = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'❄️', 73:'❄️', 75:'❄️', 77:'❄️',
  80:'🌦️', 81:'🌧️', 82:'🌧️',
  85:'❄️', 86:'❄️',
  95:'⛈️', 96:'⛈️', 99:'⛈️'
};

function isRain(code) {
  return [51,53,55,61,63,65,80,81,82,95,96,99].includes(code);
}
function isSnow(code) {
  return [71,73,75,77,85,86].includes(code);
}

const DAYS_JA = ['日','月','火','水','木','金','土'];

function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'block' : 'none';
}
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
function showResults(v) {
  document.getElementById('results').style.display = v ? 'block' : 'none';
}

async function geocodeCity(city) {
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ja&format=json`;
  const res = await fetch(url);
  const data = await res.json();
  if (!data.results || data.results.length === 0) throw new Error('場所が見つかりませんでした。別の地名で試してください。');
  const r = data.results[0];
  return { lat: r.latitude, lon: r.longitude, name: r.name + (r.admin1 ? '（' + r.admin1 + '）' : '') };
}

async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,precipitation_probability_max&timezone=Asia%2FTokyo&forecast_days=7`;
  const res = await fetch(url);
  return await res.json();
}

function renderResults(locationName, weather) {
  document.getElementById('display-location').textContent = locationName;

  const daily = weather.daily;
  const dates = daily.time;
  const codes = daily.weathercode;
  const precip = daily.precipitation_probability_max;

  const today = new Date();
  today.setHours(0,0,0,0);

  let nextRainIdx = -1;
  for (let i = 1; i < codes.length; i++) {
    if (isRain(codes[i]) || isSnow(codes[i]) || precip[i] >= 50) {
      nextRainIdx = i;
      break;
    }
  }

  const todayRain = isRain(codes[0]) || isSnow(codes[0]) || precip[0] >= 50;

  let verdictHtml = '';
  if (todayRain) {
    verdictHtml = `
      <div class="verdict-box bad">
        <div class="verdict-icon">🌧️</div>
        <div class="verdict-title">今日は洗車しないで！</div>
        <div class="verdict-desc">雨・雪の予報があります。洗車しても意味がありません。</div>
      </div>`;
  } else if (nextRainIdx === 1) {
    verdictHtml = `
      <div class="verdict-box caution">
        <div class="verdict-icon">⚠️</div>
        <div class="verdict-title">今日は微妙…</div>
        <div class="verdict-desc">明日が雨の予報です。洗車してもすぐ汚れる可能性があります。</div>
      </div>`;
  } else if (nextRainIdx === -1) {
    verdictHtml = `
      <div class="verdict-box great">
        <div class="verdict-icon">✨</div>
        <div class="verdict-title">今日が洗車チャンス！</div>
        <div class="verdict-desc">7日間は雨の予報なし。今すぐ洗車するのがベストです！</div>
      </div>`;
  } else if (nextRainIdx >= 3) {
    verdictHtml = `
      <div class="verdict-box great">
        <div class="verdict-icon">✨</div>
        <div class="verdict-title">今日は洗車日和！</div>
        <div class="verdict-desc">次の雨まで${nextRainIdx}日あります。今日洗車するのがおすすめです。</div>
      </div>`;
  } else {
    verdictHtml = `
      <div class="verdict-box caution">
        <div class="verdict-icon">🤔</div>
        <div class="verdict-title">もう少し待って</div>
        <div class="verdict-desc">次の雨まで${nextRainIdx}日しかありません。雨の後が狙い目です。</div>
      </div>`;
  }

  if (nextRainIdx > 0) {
    const rainDate = new Date(dates[nextRainIdx]);
    const m = rainDate.getMonth() + 1;
    const d = rainDate.getDate();
    verdictHtml += `
      <div class="next-wash">
        <div class="next-wash-label">次の雨・雪予報</div>
        <div class="next-wash-date">${m}月${d}日（${DAYS_JA[rainDate.getDay()]}）</div>
      </div>`;
  } else if (nextRainIdx === -1 && todayRain) {
    verdictHtml += `
      <div class="next-wash" style="background:#f0fff4;">
        <div class="next-wash-label" style="color:#276749;">雨上がり後に洗車タイミングを再確認しましょう</div>
      </div>`;
  }

  document.getElementById('verdict-area').innerHTML = verdictHtml;

  let gridHtml = '';
  for (let i = 0; i < dates.length; i++) {
    const d = new Date(dates[i]);
    const dayName = i === 0 ? '今日' : DAYS_JA[d.getDay()];
    const dateStr = (d.getMonth()+1) + '/' + d.getDate();
    const rain = isRain(codes[i]);
    const snow = isSnow(codes[i]);
    const cls = rain ? 'rain' : snow ? 'snow' : '';
    const icon = WMO_ICON[codes[i]] || '❓';
    const prob = precip[i] != null ? precip[i] + '%' : '';
    gridHtml += `
      <div class="day-cell ${cls} ${i===0?'today':''}">
        <div class="day-name" style="color:${i===0?'#3182ce':'#718096'}">${dayName}</div>
        <div class="day-date">${dateStr}</div>
        <div class="day-icon">${icon}</div>
        <div class="day-rain">${prob}</div>
      </div>`;
  }
  document.getElementById('forecast-grid').innerHTML = gridHtml;

  showResults(true);
}

async function searchByCity() {
  const city = document.getElementById('city-input').value.trim();
  if (!city) { showError('地名を入力してください'); return; }
  showError('');
  showResults(false);
  showLoading(true);
  document.getElementById('search-btn').disabled = true;
  try {
    const loc = await geocodeCity(city);
    const weather = await fetchWeather(loc.lat, loc.lon);
    renderResults(loc.name, weather);
  } catch(e) {
    showError(e.message || '天気データの取得に失敗しました');
  } finally {
    showLoading(false);
    document.getElementById('search-btn').disabled = false;
  }
}

function useGPS() {
  if (!navigator.geolocation) { showError('このブラウザではGPSが使えません'); return; }
  showError('');
  showResults(false);
  showLoading(true);
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const revUrl = `https://geocoding-api.open-meteo.com/v1/search?name=&count=1&language=ja&format=json`;
      const weather = await fetchWeather(lat, lon);
      const name = `現在地（${lat.toFixed(2)}, ${lon.toFixed(2)}）`;
      renderResults(name, weather);
    } catch(e) {
      showError('天気データの取得に失敗しました');
    } finally {
      showLoading(false);
    }
  }, err => {
    showLoading(false);
    showError('位置情報の取得に失敗しました。地名で検索してください。');
  });
}

document.getElementById('city-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') searchByCity();
});

window.addEventListener('load', () => {
  document.getElementById('city-input').value = '岡山';
  searchByCity();
});
</script>
</body>
</html>
